[build]
target = "x86_64-unknown-none"

[alias]
kbuild = "build -Zbuild-std=core,alloc --bin zeronix"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=large",
    "-C", "no-redzone=yes",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-Tlinker.ld",
]
